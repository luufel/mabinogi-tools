<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mabinogi Barter Checklist</title>
<style>
  :root {
    --bg:           #0f0b06;
    --surface:      #1e1509;
    --surface2:     #2c1f0e;
    --border:       #5a3e18;
    --border-dim:   #3a2810;
    --gold:         #c8960e;
    --gold-light:   #e8c050;
    --gold-glow:    rgba(200,150,14,0.3);
    --text:         #ddd0a8;
    --text-dim:     #7a6a48;
    --blue:         #5588cc;
    --green:        #4a9e4a;
    --green-bg:     #0d1f0d;
    --green-border: #2d5e2d;
    --maxed-bg:     #1a1a0a;
    --maxed-border: #4a4a10;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 48px;
  }

  header { text-align: center; margin-bottom: 24px; }

  header h1 {
    color: var(--gold-light);
    font-size: 1.75em;
    letter-spacing: 0.04em;
    text-shadow: 0 0 24px var(--gold-glow);
    margin-bottom: 4px;
  }

  header p {
    color: var(--text-dim);
    font-size: 0.8em;
    letter-spacing: 0.06em;
  }

  .toolbar {
    width: 100%;
    max-width: 1320px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .toolbar .summary {
    font-size: 0.82em;
    color: var(--text-dim);
    font-family: Arial, sans-serif;
  }

  .toolbar .summary strong { color: var(--gold); }

  .btn-reset {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--gold);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.82em;
    padding: 5px 12px;
    letter-spacing: 0.04em;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-reset:hover { border-color: var(--gold); color: var(--gold-light); }

  /* ── Location grid ── */
  #app {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 640px));
    gap: 18px;
    width: 100%;
    max-width: 1320px;
  }

  @media (max-width: 640px) {
    #app { grid-template-columns: 1fr; }
  }

  /* ── Location section ── */
  .location {
    width: 100%;
    margin-bottom: 0;
  }

  .location-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    user-select: none;
  }

  .location-header h2 {
    color: var(--gold-light);
    font-size: 1em;
    letter-spacing: 0.06em;
    text-shadow: 0 0 10px var(--gold-glow);
  }

  .location-header .loc-progress {
    font-size: 0.78em;
    color: var(--text-dim);
    font-family: Arial, sans-serif;
  }

  .location-header .loc-progress.done { color: var(--green); }

  .location-body { border: 1px solid var(--border); border-top: none; border-radius: 0 0 6px 6px; }
  .location-body .trade:last-child { border-radius: 0 0 6px 6px; }

  /* ── Trade row ── */
  .trade {
    display: grid;
    grid-template-columns: 1fr 36px;
    gap: 0 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-dim);
    transition: background 0.15s;
    background: var(--surface);
    cursor: pointer;
  }

  .trade:last-child { border-bottom: none; }

  .trade.checked {
    background: var(--maxed-bg);
  }

  /* Checkbox */
  .cb-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: start;
    margin-top: 2px;
  }

  .cb-wrap input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 4px;
    background: var(--surface2);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: border-color 0.15s, background 0.15s;
  }

  .cb-wrap input[type="checkbox"]:checked {
    background: var(--green-bg);
    border-color: var(--green);
  }

  .cb-wrap input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green);
    font-size: 13px;
    line-height: 18px;
    text-align: center;
    width: 100%;
  }

  /* Trade info */
  .trade-info { }

  .item-name {
    font-size: 0.92em;
    color: var(--text);
    margin-bottom: 2px;
  }

  .trade.checked .item-name { color: var(--text-dim); text-decoration: line-through; }

  .value-range {
    font-size: 0.78em;
    color: var(--text-dim);
    font-family: Arial, sans-serif;
    margin-bottom: 5px;
  }

  .cost-items {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 12px;
    font-size: 0.78em;
    font-family: Arial, sans-serif;
  }

  .cost-item {
    color: var(--blue);
    position: relative;
    cursor: default;
  }

  .cost-item:hover { color: var(--gold-light); }

  .tooltip {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 7px 10px;
    font-size: 0.78em;
    font-family: Arial, sans-serif;
    color: var(--text);
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  .tooltip::after {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-bottom-color: var(--border);
  }

  .tooltip .tip-title {
    color: var(--gold);
    font-weight: bold;
    margin-bottom: 4px;
    font-size: 0.95em;
  }

  .tooltip .tip-ing { color: var(--text-dim); }
  .tooltip .tip-ing span { color: var(--text); }

  .cost-item:hover .tooltip { display: block; }

  .trade.checked .cost-items { opacity: 0.4; }
</style>
</head>
<body>

<header>
  <h1>Barter Checklist</h1>
  <p>MABINOGI · COMMERCE · WEEKLY TRACKER</p>
</header>

<div class="toolbar">
  <span class="summary" id="global-summary"></span>
  <button class="btn-reset" onclick="resetAll()">↺ Reset Week</button>
</div>

<div id="app"></div>

<script>
const RECIPES = {
  'Shrimp Taming Bait':           ['Shrimp', 'Garlic', 'Sugar'],
  'Shyllien':                     ['Shyllien Crystal ×5'],
  'Magic Parchment':              ['Soft Parchment ×1', 'Mana Herb ×10', 'Sunlight Herb ×10'],
  'Tough String':                 ['Thick Thread Ball ×5'],
  'Hillwen Alloy':                ['Hillwen ×1', 'Nickel Ore Fragment ×1', 'Zinc Ore Fragment ×1', 'Tin Ore Fragment ×1', 'Emerald Core ×1'],
  'Wheat Flour':                  ['Wheat ×10'],
  'Spin Gear':                    ['Hillwen ×2', 'Hexagonal Bolt ×5', 'Hexagonal Nut ×5'],
  'Average Firewood':             ['Firewood ×3'],
  'Fine Silk':                    ['Thin Thread Ball ×5'],
  'Energy Amplifier':             ['Emerald Core ×3', 'Energy Converter ×3'],
  'Sturdy Loop':                  ['Braid ×1', 'Infernal Blade Fragment ×1'],
  'Magic Quill Pen':              ['Vital Feather ×1', 'Mana Herb ×10', 'Gold Herb ×10'],
  'Stamina 500 Potion':           ['Stamina 300 Potion ×1', 'Four-Leaf Clover ×1', 'Bottled Water ×1'],
  'Braid':                        ['Thick Thread Ball ×1', 'Thin Thread Ball ×1'],
  'Cotton Cushion Stuffing':      ['Fine Wool ×20', 'Thin Thread Ball ×5'],
  'Finest Silk':                  ['Thin Thread Ball ×6'],
  'Finest Leather Strap':         ['Finest Leather ×1'],
  'Tough Thread':                 ['Thin Thread Ball ×5'],
  'Spirit Liqueur':               ['White Herb ×1', 'Piece of an Ancient Spirit Fossil ×1', 'Elemental Remover ×2'],
  'Silver Plate':                 ['Silver Ingot ×1'],
  'Fine Fabric':                  ['Thick Thread Ball ×5'],
  'Pet Playset':                  ["Pet's Favorite Knickknacks ×1", 'Wood Board ×1'],
  'Hay Bale':                     ['Wheat Chaff ×20', 'Finest Leather Strap ×1'],
  'Enchanted Firewood':           ['Shyllien ×1', 'Hillwen ×1', 'Average Firewood ×1'],
  'MP 500 Potion':                ['MP 300 Potion ×1', 'Four-Leaf Clover ×1', 'Bottled Water ×1'],
  'Fine Firewood':                ['Average Firewood ×3'],
  'Energy Converter':             ['Hillwen ×1', 'Shyllien ×1'],
  'Purified Rabbit Foot':         ['Shyllien ×1', 'Mutant Rabbit Foot ×1'],
  'Sundew':                       ['Shyllien ×1', 'Mutant Plant Mucilage ×1'],
  'Finest Vanilla Scented Candle':['Fine Vanilla Scented Candle ×1', 'Refined Catalyst ×1'],
  'Artificial Turf':              ['Fresh Grass ×20', 'Bundle of Flowers ×5'],
  'Emerald Fuse':                 ['Emerald Core ×1'],
  'Fine Leather Strap':           ['Fine Leather ×1'],
  'Large Mythril Nail':           ['Mythril Ingot ×20'],
  'Poison Tip Wyvern Ballista Bolt': ['Firewood ×1', 'Wyvern Claw ×1', 'Poison Potion ×1'],
  'Finest Firewood':              ['Fine Firewood ×3'],
  'Copper Plate':                 ['Copper Ingot ×1'],
  'Mysterious Herb Powder':       ['Bloody Herb ×1', 'Mana Herb ×1', 'Poison Herb ×1'],
  'Mythril Plate':                ['Mythril Ingot ×1'],
  'Barley Flour':                 ['Barley ×10'],
  'Marionette 500 Potion':        ['Zinc Ore Fragment ×1', 'Tin Ore Fragment ×1', 'Nickel Ore Fragment ×1', 'Gold Herb ×1', 'Base Potion ×1'],
  'Gold Plate':                   ['Gold Ingot ×1'],
  'Glittering Paper':             ['Paper ×10', 'Small Silver Gem ×1', 'Small Red Gem ×1', 'Small Blue Gem ×1', 'Small Green Gem ×1'],
  'Finest Fabric':                ['Thick Thread Ball ×6'],
  'HP 500 Potion':                ['HP 300 Potion ×1', 'Four-Leaf Clover ×1', 'Bottled Water ×1'],
  'Mutant':                       ['Mutant Rabbit Foot ×10', 'Mutant Plant Mucilage ×5', 'Sasquatch Heart ×3'],
  'Harmonious Cosmos Perfume':    ['Empty Bottle ×1', 'Magic Powder ×10', 'Base Herb ×10', 'Cosmos Extract ×1'],
  'Special Firewood':             ['Finest Firewood ×1', 'Purified Enhancer ×1'],
};

const LOCATIONS = [
  {
    name: 'Karu Forest',
    trades: [
      { item: 'Wooden Table',          value: '3,410 ~ 4,343',     limit: 25, cost: [['Shrimp Taming Bait', 100], ['Shyllien', 50]] },
      { item: 'Wooden Craft',           value: '5,802 ~ 7,206',     limit: 15, cost: [['Magic Parchment', 15], ['Tough String', 30]] },
      { item: 'Stone Horse Statue',     value: '11,590 ~ 13,949',   limit: 10, cost: [['Hillwen Alloy', 20], ['Wheat Flour', 50]] },
      { item: 'Karu Shiitake Mushroom', value: '22,059 ~ 30,932',   limit:  8, cost: [['Spin Gear', 8], ['Average Firewood', 40], ['Fine Silk', 32]] },
      { item: 'Shellfish Fossil',       value: '111,300 ~ 179,656', limit:  3, cost: [['Energy Amplifier', 6], ['Sturdy Loop', 3], ['Magic Quill Pen', 15]] },
    ],
  },
  {
    name: 'Oasis',
    trades: [
      { item: 'Fine Sand',           value: '2,644 ~ 3,771',    limit: 25, cost: [['Stamina 500 Potion', 75], ['Braid', 50]] },
      { item: 'Prison Ghost Wings',  value: '4,742 ~ 6,069',    limit: 15, cost: [['Cotton Cushion Stuffing', 15], ['Finest Silk', 30]] },
      { item: 'Oasis Painting',      value: '9,990 ~ 12,545',   limit: 10, cost: [['Finest Leather Strap', 10], ['Tough Thread', 30]] },
      { item: 'Cactus Flower',       value: '24,064 ~ 30,001',  limit:  8, cost: [['Spirit Liqueur', 8], ['Silver Plate', 16], ['Fine Fabric', 32]] },
      { item: 'Giant Canine Fossil', value: '98,671 ~ 133,402', limit:  3, cost: [['Pet Playset', 3], ['Hay Bale', 9], ['Enchanted Firewood', 15]] },
    ],
  },
  {
    name: 'Calida',
    trades: [
      { item: 'Elvan Egg',             value: '3,313 ~ 4,229',     limit: 25, cost: [['MP 500 Potion', 25], ['Fine Firewood', 50]] },
      { item: 'Calida Salmon',         value: '5,631 ~ 7,152',     limit: 15, cost: [['Energy Converter', 15], ['Purified Rabbit Foot', 15]] },
      { item: 'Hot Spring Bath Bomb',  value: '12,872 ~ 15,858',   limit: 10, cost: [['Sundew', 30], ['Finest Vanilla Scented Candle', 20]] },
      { item: 'Large Camping Tent',    value: '26,084 ~ 33,533',   limit:  8, cost: [['Artificial Turf', 8], ['Emerald Fuse', 8], ['Fine Leather Strap', 40]] },
      { item: 'Pink Salt',             value: '107,892 ~ 149,675', limit:  3, cost: [['Large Mythril Nail', 9], ['Poison Tip Wyvern Ballista Bolt', 9], ['Finest Firewood', 9]] },
    ],
  },
  {
    name: 'Pera',
    trades: [
      { item: 'Volcanic Mud Pack',           value: '3,473 ~ 4,047',     limit: 25, cost: [['Copper Plate', 50], ['Mysterious Herb Powder', 75]] },
      { item: 'Magma Stone',                 value: '7,712 ~ 8,947',     limit: 15, cost: [['Mythril Plate', 30], ['Barley Flour', 45]] },
      { item: 'Ixion Horn',                  value: '13,940 ~ 16,402',   limit: 10, cost: [['Marionette 500 Potion', 30], ['Gold Plate', 50]] },
      { item: 'Volcano Lizard Egg',          value: '27,687 ~ 39,858',   limit:  8, cost: [['Glittering Paper', 40], ['Finest Fabric', 40], ['HP 500 Potion', 16]] },
      { item: 'Raspa Black Leopard Leather', value: '119,257 ~ 156,916', limit:  3, cost: [['Mutant', 3], ['Harmonious Cosmos Perfume', 6], ['Special Firewood', 9]] },
    ],
  },
];

const STORAGE_KEY = 'mabi-barter-checks';
const WEEK_KEY    = 'mabi-barter-week';

function getWeekId() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  return `${d.getFullYear()}-${Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7)}`;
}

function loadChecks() {
  const week = localStorage.getItem(WEEK_KEY);
  if (week !== getWeekId()) {
    localStorage.setItem(WEEK_KEY, getWeekId());
    localStorage.removeItem(STORAGE_KEY);
    return {};
  }
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveChecks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checks));
  localStorage.setItem(WEEK_KEY, getWeekId());
}

let checks = loadChecks();

function key(li, ti) { return `${li}-${ti}`; }

function toggle(li, ti) {
  const k = key(li, ti);
  checks[k] = !checks[k];
  saveChecks();
  renderTrade(li, ti);
  renderLocHeader(li);
  renderGlobalSummary();
}

function resetAll() {
  checks = {};
  saveChecks();
  render();
}

function renderTrade(li, ti) {
  const k = key(li, ti);
  const done = !!checks[k];
  const el = document.getElementById(`trade-${li}-${ti}`);
  if (!el) return;
  el.className = `trade${done ? ' checked' : ''}`;
  el.querySelector('input[type="checkbox"]').checked = done;
}

function renderLocHeader(li) {
  const loc = LOCATIONS[li];
  const done  = loc.trades.filter((_, ti) => !!checks[key(li, ti)]).length;
  const total = loc.trades.length;
  const el = document.getElementById(`loc-prog-${li}`);
  if (!el) return;
  el.textContent = `${done}/${total} done`;
  el.className = `loc-progress${done === total ? ' done' : ''}`;
}

function renderGlobalSummary() {
  let total = 0, done = 0;
  LOCATIONS.forEach((loc, li) => {
    loc.trades.forEach((_, ti) => {
      total++;
      if (checks[key(li, ti)]) done++;
    });
  });
  document.getElementById('global-summary').innerHTML =
    `<strong>${done}</strong> / ${total} materials gathered this week`;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  LOCATIONS.forEach((loc, li) => {
    const done  = loc.trades.filter((_, ti) => !!checks[key(li, ti)]).length;
    const total = loc.trades.length;

    const tradesHtml = loc.trades.map((trade, ti) => {
      const checked = !!checks[key(li, ti)];
      const costHtml = trade.cost.map(([name, qty]) => {
        const recipe = RECIPES[name];
        const tip = recipe
          ? `<div class="tooltip"><div class="tip-title">${name}</div>${recipe.map(i => `<div class="tip-ing"><span>${i}</span></div>`).join('')}</div>`
          : '';
        return `<span class="cost-item">${name} ×${qty}${tip}</span>`;
      }).join('');
      return `
<div class="trade${checked ? ' checked' : ''}" id="trade-${li}-${ti}" onclick="toggle(${li},${ti})">
  <div class="trade-info">
    <div class="item-name">${trade.item}</div>
    <div class="value-range">${trade.value} Ducats &nbsp;·&nbsp; Limit: ${trade.limit}/wk</div>
    <div class="cost-items">${costHtml}</div>
  </div>
  <div class="cb-wrap">
    <input type="checkbox"${checked ? ' checked' : ''} onclick="event.stopPropagation();toggle(${li},${ti})">
  </div>
</div>`;
    }).join('');

    app.innerHTML += `
<div class="location">
  <div class="location-header">
    <h2>${loc.name}</h2>
    <span class="loc-progress${done === total ? ' done' : ''}" id="loc-prog-${li}">${done}/${total} done</span>
  </div>
  <div class="location-body">${tradesHtml}</div>
</div>`;
  });

  renderGlobalSummary();
}

render();
</script>
</body>
</html>
