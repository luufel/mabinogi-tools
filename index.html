<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mabinogi Tools</title>
<style>
  :root {
    --bg:       #0f0b06;
    --surface:  #1e1509;
    --surface2: #2c1f0e;
    --border:   #5a3a1a;
    --gold:     #c8922a;
    --gold2:    #e8b84b;
    --text:     #f0ddb0;
    --muted:    #a08050;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2rem;
    color: var(--gold2);
    letter-spacing: 0.05em;
    text-shadow: 0 0 20px rgba(200, 146, 42, 0.4);
  }

  header p {
    color: var(--muted);
    margin-top: 0.4rem;
    font-size: 0.9rem;
  }

  .divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1rem auto 0;
  }

  .tools {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
    max-width: 480px;
  }

  a.tool-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.1rem 1.4rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }

  a.tool-card:hover {
    background: var(--surface2);
    border-color: var(--gold);
    transform: translateY(-2px);
  }

  .tool-icon {
    font-size: 1.6rem;
    flex-shrink: 0;
    width: 2.4rem;
    text-align: center;
  }

  .tool-info {
    flex: 1;
  }

  .tool-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--gold2);
  }

  .tool-desc {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .tool-arrow {
    color: var(--border);
    font-size: 1rem;
    transition: color 0.15s;
  }

  a.tool-card:hover .tool-arrow {
    color: var(--gold);
  }

  footer {
    margin-top: 3rem;
    color: var(--muted);
    font-size: 0.75rem;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Mabinogi Tools</h1>
  <p>Fan-made utilities for Mabinogi players</p>
  <div class="divider"></div>
</header>

<nav class="tools">
  <a class="tool-card" href="barter-checklist/">
    <div class="tool-icon">🧾</div>
    <div class="tool-info">
      <div class="tool-name">Barter Checklist</div>
      <div class="tool-desc">Track barter trades and material quantities across locations</div>
    </div>
    <div class="tool-arrow">›</div>
  </a>

  <a class="tool-card" href="ah-coupon-calculator/">
    <div class="tool-icon">🏷️</div>
    <div class="tool-info">
      <div class="tool-name">AH Coupon Calculator</div>
      <div class="tool-desc">Calculate auction house coupon costs and savings</div>
    </div>
    <div class="tool-arrow">›</div>
  </a>
</nav>

<footer>luufel &middot; <a href="https://github.com/luufel/mabinogi-tools" style="color:var(--muted)">GitHub</a></footer>

</body>
</html>
